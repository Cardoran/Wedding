<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hochzeit – Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Georgia", serif;
      background: #f8f3e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ---------------------------------------------------
       GOLDENE GLITZERPUNKTE
    --------------------------------------------------- */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #f7e7b7, #c8a96a);
      border-radius: 50%;
      opacity: 0.8;
      animation: sparkle 2s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.5); opacity: 0.4; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    /* ---------------------------------------------------
       BLÜTENBLÄTTER – sanft fallend
    --------------------------------------------------- */
    .petal {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #f4cbd4;
      border-radius: 60% 40% 60% 40%;
      opacity: 0.8;
      animation: fall linear infinite;
      pointer-events: none;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* ---------------------------------------------------
       MONOGRAMM L&M
    --------------------------------------------------- */
    .monogram {
      position: absolute;
      top: 40px;
      font-family: "Tangerine", cursive;
      font-size: 4rem;
      color: transparent;
      background: linear-gradient(135deg, #d9c39a, #bfa06a, #e8d7b0);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 12px rgba(200,169,106,0.4);
      z-index: 20;
      letter-spacing: 4px;
    }

    /* ---------------------------------------------------
       FLORALER GOLDENER RAHMEN
    --------------------------------------------------- */
    .container {
      position: relative;
      z-index: 10;
      background: #fffdf8;
      padding: 3rem 2.5rem;
      border-radius: 20px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      border: 3px solid transparent;
      background-size: cover;
      background-origin: border-box;
      background-clip: padding-box, border-box;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------------------------------------------------
       TEXT & FORM
    --------------------------------------------------- */
    h1 {
      font-size: 2.4rem;
      color: #7a5a3a;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    p {
      color: #7a5a3a;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.5rem 0 1rem;
      border: 1.5px solid #d9c39a;
      border-radius: 10px;
      font-size: 1rem;
      background: #fdfaf4;
      box-sizing: border-box;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #c8a96a;
      box-shadow: 0 0 10px rgba(200,169,106,0.4);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #c8a96a, #bfa06a);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    button:hover {
      background: linear-gradient(135deg, #bfa06a, #a88955);
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(200,169,106,0.5);
    }

    .error {
      color: #b33a3a;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
  </style>

  <!-- Google Font für das Monogramm -->
  <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- MONOGRAMM -->
  <div class="monogram">L & M</div>

  <!-- GLITZERPUNKTE (20 Stück) -->
  <script>
    for (let i = 0; i < 20; i++) {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top = Math.random() * 100 + "vh";
      s.style.animationDelay = Math.random() * 2 + "s";
      document.body.appendChild(s);
    }
  </script>

  <!-- BLÜTENBLÄTTER (15 Stück) -->
  <script>
    for (let i = 0; i < 15; i++) {
      const p = document.createElement("div");
      p.className = "petal";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = 6 + Math.random() * 6 + "s";
      p.style.opacity = 0.5 + Math.random() * 0.5;
      document.body.appendChild(p);
    }
  </script>

  <div class="container">
    <h1>Willkommen zur Hochzeit</h1>
    <p>Bitte gib das Passwort ein:</p>

    <form id="login-form">
      <input type="password" id="password" placeholder="Passwort" required />
      <button type="submit">Eintritt</button>
      <p id="error" class="error"></p>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      try {
        const response = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/main.html';
        } else {
          error.textContent = 'Falsches Passwort';
        }
      } catch (err) {
        error.textContent = 'Fehler beim Login';
      }
    });
  </script>

</body>
</html>
