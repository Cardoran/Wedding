<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hochzeit – Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Georgia", serif;
      background: #faf7f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Florale Ornamente als echte HTML-Elemente */
    .ornament {
      position: absolute;
      width: 200px;
      height: 200px;
      opacity: 0.18;
      z-index: 1;
    }

    .top-left {
      top: 0;
      left: 0;
      transform: translate(-20px, -20px);
    }

    .bottom-right {
      bottom: 0;
      right: 0;
      transform: translate(20px, 20px) rotate(180deg);
    }

    .container {
      position: relative;
      z-index: 10;
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 2px solid #e8dfd3;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: "Georgia", serif;
      font-size: 2.4rem;
      color: #8b5e34;
      margin-bottom: 0.5rem;
    }

    p {
      color: #6b4f3a;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.5rem 0 1rem;
      border: 1.5px solid #d8c7b8;
      border-radius: 6px;
      font-size: 1rem;
      background: #fdfbf8;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #b08968;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #8b5e34;
      transform: scale(1.03);
    }

    .error {
      color: #b33a3a;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <!-- Ornament oben links -->
  <svg class="ornament top-left" viewBox="0 0 200 200">
    <path d="M20 160 C60 120, 100 80, 160 20" stroke="#8b5e34" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="50" cy="150" r="8" fill="#d4a373"/>
    <circle cx="90" cy="110" r="6" fill="#b08968"/>
  </svg>

  <!-- Ornament unten rechts -->
  <svg class="ornament bottom-right" viewBox="0 0 200 200">
    <path d="M20 160 C60 120, 100 80, 160 20" stroke="#8b5e34" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="50" cy="150" r="8" fill="#d4a373"/>
    <circle cx="90" cy="110" r="6" fill="#b08968"/>
  </svg>

  <div class="container">
    <h1>Willkommen zur Hochzeit</h1>
    <p>Bitte gib das Passwort ein:</p>

    <form id="login-form">
      <input type="password" id="password" placeholder="Passwort" required />
      <button type="submit">Eintritt</button>
      <p id="error" class="error"></p>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      try {
        const response = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/main.html';
        } else {
          error.textContent = 'Falsches Passwort';
        }
      } catch (err) {
        error.textContent = 'Fehler beim Login';
      }
    });
  </script>
</body>
</html>
