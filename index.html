<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hochzeit – Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Georgia", serif;
      background: #f8f3e9; /* Creme */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Verspielte, geschwungene goldene Ornamente */
    .ornament {
      position: absolute;
      width: 180px;
      height: 180px;
      opacity: 0.28;
      z-index: 1;
    }

    .top-left {
      top: 10px;
      left: 10px;
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
      transform: rotate(180deg);
    }

    .container {
      position: relative;
      z-index: 10;
      background: #fffdf8; /* Eierschale */
      padding: 3rem 2.5rem;
      border-radius: 20px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      border: 2px solid #e7d9c5;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.4rem;
      color: #7a5a3a;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    p {
      color: #7a5a3a;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.5rem 0 1rem;
      border: 1.5px solid #d9c39a;
      border-radius: 10px;
      font-size: 1rem;
      background: #fdfaf4;
      box-sizing: border-box;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #c8a96a;
      box-shadow: 0 0 10px rgba(200,169,106,0.4);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #c8a96a, #bfa06a);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    button:hover {
      background: linear-gradient(135deg, #bfa06a, #a88955);
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(200,169,106,0.5);
    }

    .error {
      color: #b33a3a;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <!-- Schnörkel oben links -->
  <svg class="ornament top-left" viewBox="0 0 200 200">
    <path d="M20 150 
             C40 120, 80 110, 90 140
             C110 180, 160 160, 150 110
             C140 70, 100 60, 70 80
             C40 100, 30 60, 60 40"
          stroke="#c8a96a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="135" r="6" fill="#d9c39a"/>
    <circle cx="120" cy="95" r="5" fill="#bfa06a"/>
  </svg>

  <!-- Schnörkel unten rechts -->
  <svg class="ornament bottom-right" viewBox="0 0 200 200">
    <path d="M20 150 
             C40 120, 80 110, 90 140
             C110 180, 160 160, 150 110
             C140 70, 100 60, 70 80
             C40 100, 30 60, 60 40"
          stroke="#c8a96a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="135" r="6" fill="#d9c39a"/>
    <circle cx="120" cy="95" r="5" fill="#bfa06a"/>
  </svg>

  <div class="container">
    <h1>Willkommen zur Hochzeit</h1>
    <p>Bitte gib das Passwort ein:</p>

    <form id="login-form">
      <input type="password" id="password" placeholder="Passwort" required />
      <button type="submit">Eintritt</button>
      <p id="error" class="error"></p>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      try {
        const response = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/main.html';
        } else {
          error.textContent = 'Falsches Passwort';
        }
      } catch (err) {
        error.textContent = 'Fehler beim Login';
      }
    });
  </script>

</body>
</html>
