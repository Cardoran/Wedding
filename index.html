<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hochzeit – Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Georgia", serif;
      background: #faf7f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Florale SVG-Ornamente – jetzt mit z-index und kleineren Maßen */
    .ornament {
      position: absolute;
      width: 180px;
      height: 180px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .ornament.top-left {
      top: 0;
      left: 0;
      transform: translate(-20px, -20px);
      background-image: url("data:image/svg+xml;utf8,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
          <path d='M20 160 C60 120, 100 80, 160 20' stroke='%238b5e34' stroke-width='5' fill='none' stroke-linecap='round'/>
          <circle cx='50' cy='150' r='7' fill='%23d4a373'/>
          <circle cx='90' cy='110' r='5' fill='%23b08968'/>
        </svg>");
    }

    .ornament.bottom-right {
      bottom: 0;
      right: 0;
      transform: translate(20px, 20px) rotate(180deg);
      background-image: url("data:image/svg+xml;utf8,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
          <path d='M20 160 C60 120, 100 80, 160 20' stroke='%238b5e34' stroke-width='5' fill='none' stroke-linecap='round'/>
          <circle cx='50' cy='150' r='7' fill='%23d4a373'/>
          <circle cx='90' cy='110' r='5' fill='%23b08968'/>
        </svg>");
    }

    .container {
      position: relative;
      z-index: 10; /* Box liegt über den Ornamenten */
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid #e8dfd3;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: "Georgia", serif;
      font-size: 2.2rem;
      color: #8b5e34;
      margin-bottom: 0.5rem;
    }

    p {
      color: #6b4f3a;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      margin: 0.5rem 0 1rem;
      border: 1px solid #d8c7b8;
      border-radius: 6px;
      font-size: 1rem;
      background: #fdfbf8;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #b08968;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #8b5e34;
    }

    .error {
      color: #b33a3a;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <!-- Ornamente -->
  <div class="ornament top-left"></div>
  <div class="ornament bottom-right"></div>

  <div class="container">
    <h1>Willkommen zur Hochzeit</h1>
    <p>Bitte gib das Passwort ein:</p>

    <form id="login-form">
      <input type="password" id="password" placeholder="Passwort" required />
      <button type="submit">Eintritt</button>
      <p id="error" class="error"></p>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      try {
        const response = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/main.html';
        } else {
          error.textContent = 'Falsches Passwort';
        }
      } catch (err) {
        error.textContent = 'Fehler beim Login';
      }
    });
  </script>
</body>
</html>
